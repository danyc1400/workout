<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>Dany's Workout Plan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --rose-dark:   #C0587A;
  --rose:        #D4789A;
  --rose-mid:    #E49AB6;
  --rose-light:  #F0BDD0;
  --rose-pale:   #FDEEF4;
  --bg:          #FDF6F9;
  --white:       #FFFFFF;
  --off-white:   #FEF9FB;
  --text:        #2A1A22;
  --muted:       #9A7888;
  --border:      #F2D8E2;
  --shadow:      0 2px 14px rgba(192,88,122,.08);
  --radius:      16px;
  --radius-sm:   10px;
  --danger:      #C04545;

  --m-back:      #EDF2FF;
  --m-chest:     #FFF0F3;
  --m-shoulders: #F0FFF4;
  --m-biceps:    #FFFBEB;
  --m-triceps:   #F5F0FF;
  --m-glutes:    #FFF0F6;
  --m-quads:     #F0FCFF;
  --m-hamstrings:#FFFFF0;
  --m-calves:    #F0FFF8;
  --m-abs:       #FFF8F0;
  --m-cardio:    #F8F0FF;
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);font-family:'Nunito',sans-serif;color:var(--text)}
body{max-width:430px;margin:0 auto}

/* ── VIEWS ── */
.view{display:none;min-height:100vh;padding-bottom:88px}
.view.active{display:block}

/* ── NAV ── */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;
  background:var(--white);border-top:1px solid var(--border);display:flex;z-index:100;
  padding-bottom:env(safe-area-inset-bottom,0px)}
.nav-btn{flex:1;padding:12px 4px 10px;display:flex;flex-direction:column;align-items:center;
  gap:3px;border:none;background:none;cursor:pointer;color:var(--muted);font-size:10px;
  font-weight:600;letter-spacing:.3px;text-transform:uppercase}
.nav-btn.active{color:var(--rose)}
.nav-btn svg{width:22px;height:22px;stroke-width:1.75}

/* ── HEADER ── */
.header{background:var(--rose-dark);color:#fff;padding:16px 20px 14px;
  position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:12px}
.header h1{font-size:18px;font-weight:700;letter-spacing:-.3px;flex:1}
.header-sub{font-size:12px;color:rgba(255,255,255,.6);font-weight:400;margin-top:2px}
.back-btn{background:none;border:none;color:#fff;cursor:pointer;padding:4px;
  display:flex;align-items:center;opacity:.8}

/* ── SCHEDULE ── */
.schedule-intro{padding:22px 20px 6px}
.schedule-intro h2{font-size:22px;font-weight:700;letter-spacing:-.4px}
.schedule-intro p{color:var(--muted);font-size:13px;margin-top:5px}
.week-grid{padding:10px 16px;display:flex;flex-direction:column;gap:8px}

.day-card{background:var(--white);border-radius:var(--radius);padding:15px 16px;
  display:flex;align-items:center;gap:14px;box-shadow:var(--shadow);cursor:pointer;
  border:2px solid transparent;transition:border-color .15s,transform .1s;user-select:none}
.day-card:active{transform:scale(.98)}
.day-card.today{border-color:var(--rose-light)}
.day-card.no-tap{cursor:default}

.day-dot{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;letter-spacing:0}
.day-dot.weights{background:var(--rose-dark);color:#fff}
.day-dot.pilates{background:#EDE9FF;color:#5B3FA0;font-size:10px;font-weight:700;
  text-align:center;line-height:1.3}
.day-dot.rest{background:var(--border);color:var(--muted)}
.day-dot.today-ring{box-shadow:0 0 0 3px var(--rose-light)}

.day-info{flex:1}
.day-name{font-size:15px;font-weight:700}
.day-sub{font-size:12px;color:var(--muted);margin-top:2px}
.today-badge{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;
  background:var(--rose-pale);color:var(--rose-dark)}
.done-badge{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;
  background:#E6F9EE;color:#1A6B3C}

/* ── WORKOUT ── */
.workout-meta{padding:14px 20px 6px;display:flex;align-items:center;justify-content:space-between}
.workout-meta h2{font-size:19px;font-weight:700;letter-spacing:-.3px}
.workout-meta p{font-size:12px;color:var(--muted);margin-top:3px}
.new-week-btn{font-size:12px;font-weight:700;color:var(--rose);background:var(--rose-pale);
  border:none;border-radius:20px;padding:6px 14px;cursor:pointer;flex-shrink:0}
.new-week-btn:active{opacity:.7}

.ex-list{padding:0 16px 8px;display:flex;flex-direction:column;gap:0}

/* ── CARDIO CARD ── */
.cardio-card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);
  margin-bottom:10px;overflow:hidden}
.cardio-stripe{height:4px;background:linear-gradient(90deg,#C9A0DC,#E8A0B4)}
.cardio-inner{padding:14px 16px;display:flex;align-items:center;gap:14px}
.cardio-icon{width:44px;height:44px;border-radius:50%;background:var(--m-cardio);
  display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.cardio-info{flex:1}
.cardio-title{font-size:15px;font-weight:700}
.cardio-sub{font-size:12px;color:var(--muted);margin-top:3px}
.cardio-check{width:38px;height:38px;border-radius:50%;border:2px solid var(--border);
  background:var(--white);cursor:pointer;font-size:18px;display:flex;align-items:center;
  justify-content:center;flex-shrink:0;transition:all .15s}
.cardio-check.done{background:var(--rose-dark);border-color:var(--rose-dark);color:#fff}
.cardio-check:active{transform:scale(.9)}

/* ── EXERCISE CARD ── */
.ex-wrap{position:relative}
.ss-line{width:2px;height:14px;margin:0 auto;border-left:2px dashed var(--rose-light)}

.ex-card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);
  overflow:hidden;margin-bottom:8px}
.ex-card.ss-top{border-radius:var(--radius) var(--radius) var(--radius-sm) var(--radius-sm);margin-bottom:0}
.ex-card.ss-bot{border-radius:var(--radius-sm) var(--radius-sm) var(--radius) var(--radius);margin-bottom:8px}
.ex-card.all-done .ex-header{opacity:.5}

.ex-stripe{height:4px}
.ex-header{padding:13px 14px 9px;display:flex;align-items:flex-start;gap:8px}
.ex-title{flex:1}
.ex-name{font-size:15px;font-weight:700;line-height:1.2}
.ex-chips{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap}
.chip{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;letter-spacing:.2px}
.chip-ss{background:#FDE8F0;color:#8B2252}
.chip-uni{background:#EDE9FF;color:#5B3FA0}

.ex-btns{display:flex;gap:6px;flex-shrink:0;padding-top:2px}
.icon-btn{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--border);
  background:var(--white);cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:14px;transition:background .12s}
.icon-btn:active{background:var(--rose-pale)}
.icon-btn.on{background:var(--rose-pale);border-color:var(--rose-light)}

.sets-header{display:grid;grid-template-columns:32px 1fr 1fr 36px;gap:6px;
  padding:4px 14px 5px;font-size:10px;font-weight:700;color:var(--muted);
  text-align:center;letter-spacing:.4px;text-transform:uppercase}
.set-row{display:grid;grid-template-columns:32px 1fr 1fr 36px;gap:6px;
  padding:0 14px;margin-bottom:7px;align-items:center}
.set-num{font-size:12px;font-weight:700;color:var(--muted);text-align:center}
.set-input{border:1.5px solid var(--border);border-radius:var(--radius-sm);
  padding:9px 6px;font-size:15px;font-weight:600;text-align:center;width:100%;
  color:var(--text);background:var(--off-white);-moz-appearance:textfield;
  font-family:inherit}
.set-input::-webkit-outer-spin-button,.set-input::-webkit-inner-spin-button{-webkit-appearance:none}
.set-input:focus{outline:none;border-color:var(--rose-mid);background:#fff}
.set-input:read-only{color:var(--muted);background:var(--off-white)}

.check-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid var(--border);
  background:var(--white);cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:16px;transition:all .15s;flex-shrink:0}
.check-btn:active{transform:scale(.88)}
.check-btn.done{background:var(--rose-dark);border-color:var(--rose-dark);color:#fff}

.prev-note{font-size:10px;color:var(--muted);padding:0 14px 10px;font-style:italic}

/* ── BLOCK HEADER ── */
.block-header{margin:10px 16px 6px;padding:8px 14px;font-size:11px;font-weight:700;
  color:var(--rose-dark);text-transform:uppercase;letter-spacing:1.2px;
  background:var(--rose-pale);border-radius:var(--radius-sm);
  border-left:3px solid var(--rose)}

/* ── ABS ── */
.abs-set-row{display:grid;grid-template-columns:1fr auto 36px;gap:10px;
  padding:8px 14px;align-items:center;border-bottom:1px solid var(--border)}
.abs-set-row:last-child{border-bottom:none;padding-bottom:12px}
.abs-ex-name{font-size:14px;font-weight:600}
.abs-ex-sets{font-size:12px;color:var(--muted);white-space:nowrap}

/* ── DONE BUTTON ── */
.done-btn{display:block;margin:4px 16px 16px;padding:16px;
  background:var(--rose-dark);color:#fff;border:none;border-radius:var(--radius);
  font-size:16px;font-weight:700;cursor:pointer;width:calc(100% - 32px);
  letter-spacing:.2px;transition:background .15s}
.done-btn:active{background:var(--rose)}

/* ── REST TIMER ── */
.timer-overlay{position:fixed;inset:0;background:rgba(20,8,14,.88);z-index:200;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .2s;backdrop-filter:blur(4px)}
.timer-overlay.active{opacity:1;pointer-events:all}

.timer-top-label{color:rgba(255,255,255,.5);font-size:11px;font-weight:700;
  letter-spacing:2.5px;text-transform:uppercase;margin-bottom:8px}
.timer-type-label{color:#fff;font-size:14px;font-weight:600;margin-bottom:20px;
  opacity:.8}
.timer-ring{position:relative;width:170px;height:170px}
.timer-ring svg{position:absolute;inset:0;transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:rgba(255,255,255,.08);stroke-width:9}
.ring-prog{fill:none;stroke-width:9;stroke-linecap:round;transition:stroke-dashoffset 1s linear}
.timer-num{position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center}
.timer-count{font-size:58px;font-weight:700;color:#fff;line-height:1;letter-spacing:-2px}
.timer-next{color:rgba(255,255,255,.45);font-size:11px;margin-top:6px;text-align:center;
  max-width:130px;line-height:1.4}
.timer-actions{display:flex;gap:12px;margin-top:28px}
.t-btn{padding:11px 24px;border-radius:30px;border:1.5px solid rgba(255,255,255,.2);
  background:none;color:#fff;font-size:14px;font-weight:700;cursor:pointer;
  font-family:inherit}
.t-btn.primary{background:var(--rose);border-color:var(--rose)}
.t-btn:active{opacity:.7}

/* ── SWAP MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:150;
  display:none;align-items:flex-end}
.modal-bg.active{display:flex}
.modal-sheet{background:var(--white);border-radius:22px 22px 0 0;width:100%;
  max-height:78vh;overflow-y:auto;padding-bottom:env(safe-area-inset-bottom,16px)}
.modal-handle{width:38px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0}
.modal-hdr{padding:15px 20px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between}
.modal-hdr-title{font-size:16px;font-weight:700}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;
  color:var(--muted);padding:4px;line-height:1}
.swap-group{padding:8px 20px 3px;font-size:10px;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:.6px;background:var(--off-white)}
.swap-row{display:flex;align-items:center;gap:12px;padding:13px 20px;cursor:pointer;
  border-bottom:1px solid var(--border)}
.swap-row:last-child{border-bottom:none}
.swap-row:active{background:var(--rose-pale)}
.swap-row-info{flex:1}
.swap-row-name{font-size:14px;font-weight:600}
.swap-row-note{font-size:11px;color:var(--muted);margin-top:2px}
.swap-tick{color:var(--rose);font-size:18px;font-weight:700}

/* ── HISTORY ── */
.hist-empty{padding:60px 20px;text-align:center;color:var(--muted)}
.hist-empty-icon{font-size:44px;margin-bottom:14px}
.hist-card{background:var(--white);border-radius:var(--radius);margin:0 16px 10px;
  padding:15px;box-shadow:var(--shadow);cursor:pointer}
.hist-card:active{opacity:.8}
.hist-date{font-size:11px;color:var(--muted);margin-bottom:4px}
.hist-name{font-size:15px;font-weight:700}
.hist-meta{font-size:12px;color:var(--muted);margin-top:3px}
.hist-detail{margin-top:11px;padding-top:11px;border-top:1px solid var(--border);display:none}
.hist-detail.open{display:block}
.hist-ex-row{font-size:12px;color:var(--muted);padding:3px 0;display:flex;gap:8px}
.hist-ex-row b{color:var(--text);font-weight:600}
</style>
</head>
<body>

<!-- SCHEDULE VIEW -->
<div id="view-schedule" class="view active">
  <div class="header" style="padding:20px 20px 16px">
    <div style="flex:1">
      <div style="font-size:11px;letter-spacing:1.5px;color:rgba(255,255,255,.5);text-transform:uppercase;font-weight:600;margin-bottom:5px">Dany's Workout Plan</div>
      <h1 id="greeting" style="font-size:22px;font-weight:700"></h1>
    </div>
    <div style="text-align:right">
      <div style="font-size:12px;color:rgba(255,255,255,.6)" id="date-label"></div>
      <div style="font-size:11px;color:rgba(255,255,255,.4);margin-top:3px" id="week-label"></div>
    </div>
  </div>
  <div id="schedule-body"></div>
</div>

<!-- WORKOUT VIEW -->
<div id="view-workout" class="view">
  <div class="header">
    <button class="back-btn" onclick="showView('schedule')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="22" height="22"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    </button>
    <div style="flex:1">
      <h1 id="w-day-title" style="font-size:18px">Monday</h1>
      <div class="header-sub" id="w-day-sub"></div>
    </div>
    <div id="w-done-badge" style="display:none;background:rgba(255,255,255,.15);color:#fff;font-size:11px;font-weight:700;padding:5px 12px;border-radius:20px">Done ✓</div>
  </div>
  <div id="workout-body"></div>
</div>

<!-- HISTORY VIEW -->
<div id="view-history" class="view">
  <div class="header" style="padding:20px 20px 16px">
    <h1 style="font-size:22px;font-weight:700">History</h1>
  </div>
  <div id="history-body" style="padding:12px 0"></div>
</div>

<!-- REST TIMER -->
<div id="timer-overlay" class="timer-overlay">
  <div class="timer-top-label">REST</div>
  <div class="timer-type-label" id="timer-type-label">Between Sets · 60s</div>
  <div class="timer-ring">
    <svg viewBox="0 0 170 170" width="170" height="170">
      <circle class="ring-bg" cx="85" cy="85" r="72"/>
      <circle class="ring-prog" id="ring-prog" cx="85" cy="85" r="72"
        stroke-dasharray="452" stroke-dashoffset="0" stroke="#E0A0B4"/>
    </svg>
    <div class="timer-num">
      <div id="timer-count" class="timer-count">60</div>
      <div id="timer-next" class="timer-next"></div>
    </div>
  </div>
  <div class="timer-actions">
    <button class="t-btn" onclick="addTime(15)">+15s</button>
    <button class="t-btn primary" onclick="skipTimer()">Skip →</button>
  </div>
</div>

<!-- SWAP MODAL -->
<div id="swap-modal" class="modal-bg" onclick="if(event.target===this)closeSwap()">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-hdr">
      <div class="modal-hdr-title" id="swap-title">Swap Exercise</div>
      <button class="modal-close" onclick="closeSwap()">✕</button>
    </div>
    <div id="swap-list"></div>
  </div>
</div>

<!-- NAV -->
<nav class="nav">
  <button class="nav-btn active" id="nav-schedule" onclick="showView('schedule')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    Schedule
  </button>
  <button class="nav-btn" id="nav-workout" onclick="openTodayWorkout()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M6 4v6a6 6 0 0012 0V4"/><line x1="6" y1="20" x2="18" y2="20"/></svg>
    Today
  </button>
  <button class="nav-btn" id="nav-history" onclick="showView('history')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    History
  </button>
</nav>

<script>
// ─── EXERCISE LIBRARY ──────────────────────────────────────────────────────
const LIBRARY = {
  Back:       ["Close-Grip Lat Pulldown","Seated Cable Row (Close/Neutral)","Single-Arm Seated Cable Row ★","Barbell Bent-Over Row (Narrow)","Smith Machine Bent-Over Row","Straight-Arm Pulldown","Face Pull (Rope)","Rear Delt Fly (Cable)","Low Cable Row (Straight-Arm)"],
  Chest:      ["Smith Machine Flat Press","Smith Machine Incline Press","Smith Machine Decline Press","Dumbbell Flat Press","Dumbbell Incline Press","Dumbbell Flat Fly","Dumbbell Incline Fly","Cable Fly (Low-to-High)","Cable Fly (High-to-Low)","Cable Fly (Mid/Parallel)"],
  Shoulders:  ["Smith Machine Overhead Press","Dumbbell Overhead Press","Arnold Press","Dumbbell Lateral Raise","Cable Lateral Raise ★","Dumbbell Rear Delt Fly","Cable Rear Delt Fly","Dumbbell Front Raise","Barbell Upright Row (Narrow)","45-Degree Incline Row"],
  Biceps:     ["Barbell Curl","EZ Bar Curl","Dumbbell Curl","Hammer Curl","Cable Curl (Straight Bar)","Cable Curl (Rope)","Incline Dumbbell Curl","Dumbbell Preacher Curl ★","Reverse Curl","Concentration Curl ★"],
  Triceps:    ["Cable Pushdown (Rope)","Cable Pushdown (Straight Bar)","Overhead Cable Extension","Skull Crusher (Barbell)","Skull Crusher (Dumbbell)","Close-Grip Smith Press","Dumbbell Overhead Extension","Bench Dips","Diamond Push-Up","Cable Kickback ★"],
  Glutes:     ["Smith Machine Hip Thrust","Barbell Hip Thrust","Smith Machine Glute Bridge","Dumbbell Sumo Squat","Smith Machine Sumo Squat","Frog Pump","Curtsy Lunge ★","Romanian Deadlift (Barbell)","Cable Kickback (Glutes) ★","Smith Machine RDL"],
  Quads:      ["Smith Machine Squat (High Bar)","Smith Machine Front Squat","Hack Squat (Smith)","Leg Extension Machine","Dumbbell Goblet Squat","Wall Sit","Smith Machine Split Squat ★","Dumbbell Step-Up ★"],
  Hamstrings: ["Romanian Deadlift (Barbell)","Leg Curl Machine (Seated)","Stiff-Leg Deadlift","Smith Machine RDL","Good Mornings","Cable Hamstring Curl ★","Nordic Curl (Assisted)"],
  Calves:     ["Standing Calf Raise (Barbell)","Standing Calf Raise (Smith)","Seated Calf Raise","Donkey Calf Raise","Single-Leg Calf Raise ★"],
  Abs:        [
    // Rectus abdominis — 6-pack
    "Cable Crunch (Kneeling)","Bicycle Crunch","Hanging Leg Raise","Hanging Knee Raise",
    "Ab Wheel Rollout","Reverse Crunch","Leg Raise","Decline Crunch","Dragon Flag",
    // Obliques — waist narrowing
    "Cable Wood Chop (High to Low)","Cable Wood Chop (Low to High)","Cable Side Crunch",
    "Pallof Press","Side Plank","Side Plank with Hip Dip","Russian Twist",
    "Dumbbell Side Bend","Landmine Rotation",
    // Deep core / TVA — waist compression
    "Dead Bug","Hollow Body Hold","Bird Dog","Plank (Standard)","Plank with Reach",
    "Ab Vacuum","Flutter Kicks"
  ]
};

const MUSCLE_CSS = {Back:"back",Chest:"chest",Shoulders:"shoulders",Biceps:"biceps",Triceps:"triceps",Glutes:"glutes",Quads:"quads",Hamstrings:"hamstrings",Calves:"calves",Abs:"abs"};

const STRIPE_COLORS = {
  back:"#BFDBFE",chest:"#FECACA",shoulders:"#6EE7B7",biceps:"#FDE68A",
  triceps:"#C4B5FD",glutes:"#F9A8D4",quads:"#67E8F9",hamstrings:"#FEF08A",
  calves:"#86EFAC",abs:"#FDBA74"
};

// ─── DEFAULT PLAN ─────────────────────────────────────────────────────────
const DEFAULT_PLAN = {
  "upper-a": {
    label:"Upper Body A",
    exercises:[
      // Block 1 — Smith Machine
      {name:"Smith Machine Flat Press",        muscle:"Chest",     sets:3, reps:"12–15", superset:false, block:1},
      // Block 2 — Cable Stack
      {name:"Close-Grip Lat Pulldown",         muscle:"Back",      sets:3, reps:"12–15", superset:false, block:2},
      {name:"Seated Cable Row (Close/Neutral)",muscle:"Back",      sets:3, reps:"12–15", superset:false, block:2},
      {name:"Cable Pushdown (Rope)",           muscle:"Triceps",   sets:3, reps:"12–15", superset:false, block:2},
      // Block 3 — Free Weights
      {name:"Dumbbell Lateral Raise",          muscle:"Shoulders", sets:3, reps:"12–15", superset:false, block:3},
      {name:"Barbell Curl",                    muscle:"Biceps",    sets:3, reps:"12–15", superset:false, block:3},
    ],
    abs:[
      {name:"Cable Crunch (Kneeling)", sets:"3 × 12"},
      {name:"Dead Bug",                sets:"3 × 12 ea"},
      {name:"Plank (Standard)",        sets:"3 × 45s"},
    ]
  },
  "lower": {
    label:"Lower Body",
    exercises:[
      // Block 1 — Smith Machine
      {name:"Smith Machine Hip Thrust",      muscle:"Glutes",     sets:3, reps:"12–15", superset:false, block:1},
      {name:"Smith Machine Squat (High Bar)",muscle:"Quads",      sets:3, reps:"12–15", superset:false, block:1},
      {name:"Standing Calf Raise (Smith)",   muscle:"Calves",     sets:3, reps:"15–20", superset:false, block:1},
      // Block 2 — Machines
      {name:"Leg Extension Machine",         muscle:"Quads",      sets:3, reps:"12–15", superset:false, block:2},
      {name:"Leg Curl Machine (Seated)",     muscle:"Hamstrings", sets:3, reps:"12–15", superset:false, block:2},
      // Block 3 — Free Weights
      {name:"Romanian Deadlift (Barbell)",   muscle:"Hamstrings", sets:3, reps:"12–15", superset:false, block:3},
      {name:"Dumbbell Sumo Squat",           muscle:"Glutes",     sets:3, reps:"12–15", superset:false, block:3},
    ],
    abs:[]
  },
  "upper-b": {
    label:"Upper Body B",
    exercises:[
      // Block 1 — Cable Stack
      {name:"Straight-Arm Pulldown",   muscle:"Back",      sets:3, reps:"12–15", superset:false, block:1},
      {name:"Face Pull (Rope)",        muscle:"Back",      sets:3, reps:"12–15", superset:false, block:1},
      // Block 2 — Dumbbells / Bench
      {name:"Dumbbell Incline Press",  muscle:"Chest",     sets:3, reps:"12–15", superset:false, block:2},
      {name:"Arnold Press",            muscle:"Shoulders", sets:3, reps:"12–15", superset:false, block:2},
      {name:"Hammer Curl",             muscle:"Biceps",    sets:3, reps:"12–15", superset:false, block:2},
      {name:"Skull Crusher (Dumbbell)",muscle:"Triceps",   sets:3, reps:"12–15", superset:false, block:2},
    ],
    abs:[
      {name:"Bicycle Crunch",  sets:"3 × 15 ea"},
      {name:"Leg Raise",       sets:"3 × 12"},
      {name:"Side Plank",      sets:"3 × 45s ea"},
    ]
  }
};

const SCHEDULE = [
  {day:"Monday",    type:"upper-a", kind:"weights"},
  {day:"Tuesday",   type:"lower",   kind:"weights"},
  {day:"Wednesday", type:null,      kind:"pilates"},
  {day:"Thursday",  type:"upper-b", kind:"weights"},
  {day:"Friday",    type:null,      kind:"pilates"},
  {day:"Saturday",  type:null,      kind:"pilates"},
  {day:"Sunday",    type:null,      kind:"rest"},
];

// ─── PLAN VERSION — bump this whenever DEFAULT_PLAN structure/order changes ──
const PLAN_VERSION = 2;
if (parseInt(localStorage.getItem("plan_version") || "0") < PLAN_VERSION) {
  ["upper-a","lower","upper-b"].forEach(t => localStorage.removeItem("plan_" + t));
  localStorage.setItem("plan_version", PLAN_VERSION);
}

// ─── STATE ────────────────────────────────────────────────────────────────
let activeDayKey  = null;
let activePlan    = null;
let session       = null;
let swapIdx       = null;
let timerHandle   = null;
let timerLeft     = 0;
let timerTotal    = 0;
let weekNum       = parseInt(localStorage.getItem("week_num") || "1");

// ─── PLAN STORAGE ─────────────────────────────────────────────────────────
function getPlan(type) {
  const s = localStorage.getItem("plan_" + type);
  return s ? JSON.parse(s) : JSON.parse(JSON.stringify(DEFAULT_PLAN[type]));
}
function savePlan(type, plan) {
  localStorage.setItem("plan_" + type, JSON.stringify(plan));
}

// ─── NAVIGATION ───────────────────────────────────────────────────────────
function showView(v) {
  document.querySelectorAll(".view").forEach(el => el.classList.remove("active"));
  document.querySelectorAll(".nav-btn").forEach(el => el.classList.remove("active"));
  document.getElementById("view-" + v).classList.add("active");
  const navEl = document.getElementById("nav-" + v);
  if (navEl) navEl.classList.add("active");
  if (v === "schedule") renderSchedule();
  if (v === "history")  renderHistory();
}

function openTodayWorkout() {
  const todayName = new Date().toLocaleDateString("en-US", {weekday:"long"});
  const entry = SCHEDULE.find(d => d.day === todayName);
  if (entry && entry.kind === "weights") openWorkout(entry.day, entry.type);
  else showView("schedule");
}

function openWorkout(dayName, type) {
  activeDayKey = dayName;
  activePlan   = getPlan(type);
  const dKey   = todayKey();
  const stored = localStorage.getItem("sess_" + dKey + "_" + type);
  const saved  = stored ? JSON.parse(stored) : null;

  // Always rebuild from current plan order so block groupings and exercise order stay current.
  // Preserve any set data already logged by matching on exercise name.
  session = {
    type, dayName, dKey,
    walkDone: saved?.walkDone ?? false,
    exercises: activePlan.exercises.map(ex => {
      const prev = saved?.exercises?.find(se => se.name === ex.name);
      return {
        name: ex.name, muscle: ex.muscle, superset: prev?.superset ?? ex.superset, block: ex.block,
        sets: prev?.sets ?? Array(ex.sets).fill(null).map(() => ({w:"", r:"", done:false}))
      };
    }),
    abs: saved?.abs ?? (activePlan.abs || []).map(a => ({name:a.name, sets:a.sets, done:false}))
  };
  document.getElementById("w-day-title").textContent = dayName;
  document.getElementById("w-day-sub").textContent   = activePlan.label;
  showView("workout");
  renderWorkout();
}

// ─── RENDER SCHEDULE ──────────────────────────────────────────────────────
function renderSchedule() {
  const today = new Date().toLocaleDateString("en-US", {weekday:"long"});
  const h     = new Date().getHours();
  const greet = h < 12 ? "Good morning" : h < 17 ? "Good afternoon" : "Good evening";
  document.getElementById("greeting").textContent  = greet + ", Dany";
  document.getElementById("date-label").textContent =
    new Date().toLocaleDateString("en-US", {month:"short", day:"numeric"});
  document.getElementById("week-label").textContent = "Week " + weekNum;

  const body = document.getElementById("schedule-body");
  body.innerHTML = `
    <div class="schedule-intro"><h2>This Week</h2><p>Tap a training day to start</p></div>
    <div class="week-grid">
      ${SCHEDULE.map(e => {
        const isToday  = e.day === today;
        const isDone   = e.type && !!localStorage.getItem("sess_" + dayKey(e.day) + "_" + e.type + "_done");
        const clickable = e.kind === "weights";
        let dotHTML = e.day.slice(0,2).toUpperCase();
        let planLabel = "";
        if (e.type) planLabel = getPlan(e.type).label;
        else if (e.kind === "pilates") planLabel = "Pilates @ Align";
        else planLabel = "Rest Day";

        return `<div class="day-card ${isToday?"today":""} ${!clickable?"no-tap":""}"
                     ${clickable ? `onclick="openWorkout('${e.day}','${e.type}')"` : ""}>
          <div class="day-dot ${e.kind} ${isToday?"today-ring":""}">${dotHTML}</div>
          <div class="day-info">
            <div class="day-name">${e.day}</div>
            <div class="day-sub">${planLabel}</div>
          </div>
          ${isDone ? '<div class="done-badge">Done ✓</div>' :
            isToday && clickable ? '<div class="today-badge">Today →</div>' : ""}
        </div>`;
      }).join("")}
    </div>`;
}

// ─── RENDER WORKOUT ───────────────────────────────────────────────────────
function renderWorkout() {
  const type   = SCHEDULE.find(d => d.day === activeDayKey)?.type;
  const exList = session.exercises;
  const allDone = session.walkDone && exList.every(e => e.sets.every(s => s.done));
  const prevSess = getPrevSession(type);

  document.getElementById("w-done-badge").style.display = allDone ? "block" : "none";

  let html = `<div class="workout-meta">
    <div><h2>${activePlan.label}</h2>
    <p>20 min walk + ${exList.length} exercises${activePlan.abs?.length ? " + abs" : ""}</p></div>
    <button class="new-week-btn" onclick="doNewWeek('${type}')">New Week ↻</button>
  </div>
  <div class="ex-list">`;

  // ── INCLINE WALK CARD ──
  html += `
    <div class="cardio-card">
      <div class="cardio-stripe"></div>
      <div class="cardio-inner">
        <div class="cardio-icon">🚶‍♀️</div>
        <div class="cardio-info">
          <div class="cardio-title">Incline Walk</div>
          <div class="cardio-sub">20 min · 10% incline · warm-up pace</div>
        </div>
        <button class="cardio-check ${session.walkDone?"done":""}"
          onclick="toggleWalk()">${session.walkDone?"✓":"○"}</button>
      </div>
    </div>`;

  // ── EXERCISES ──
  let _renderedBlock = null;
  exList.forEach((ex, i) => {
    if (ex.block != null && ex.block !== _renderedBlock) {
      _renderedBlock = ex.block;
      html += `<div class="block-header">Block ${ex.block}</div>`;
    }
    const mc      = MUSCLE_CSS[ex.muscle] || "back";
    const stripe  = STRIPE_COLORS[mc] || "#EEE";
    const isUni   = ex.name.includes("★");
    const isSS    = ex.superset;
    const prevEx  = prevSess?.exercises?.find(p => p.name === ex.name);
    const allDone = ex.sets.every(s => s.done);
    const isSSTop = isSS;
    const isSSBot = i > 0 && exList[i-1].superset;

    html += `<div class="ex-wrap">`;
    if (isSSBot) html += `<div class="ss-line"></div>`;

    html += `
      <div class="ex-card ${isSSTop?"ss-top":""} ${isSSBot?"ss-bot":""} ${allDone?"all-done":""}">
        <div class="ex-stripe" style="background:${stripe}"></div>
        <div class="ex-header">
          <div class="ex-title">
            <div class="ex-name">${ex.name.replace(" ★","")}</div>
            <div class="ex-chips">
              <span class="chip" style="background:var(--m-${mc});color:#333">${ex.muscle}</span>
              ${isUni ? '<span class="chip chip-uni">Unilateral ★</span>' : ""}
              ${isSS  ? '<span class="chip chip-ss">Superset</span>' : ""}
            </div>
          </div>
          <div class="ex-btns">
            <button class="icon-btn ${isSS?"on":""}" title="Toggle superset" onclick="toggleSS(${i})">⛓</button>
            <button class="icon-btn" title="Swap exercise" onclick="openSwap(${i})">⇄</button>
          </div>
        </div>
        <div class="sets-header"><div>Set</div><div>Weight</div><div>Reps</div><div></div></div>`;

    ex.sets.forEach((set, si) => {
      const prev = prevEx?.sets?.[si];
      const wPH  = prev?.w || "lbs";
      const rPH  = prev?.r || activePlan.exercises[i]?.reps || "12–15";
      html += `
        <div class="set-row">
          <div class="set-num">${si+1}</div>
          <input class="set-input" type="number" inputmode="decimal" placeholder="${wPH}"
            value="${set.w}" id="w-${i}-${si}" ${set.done?"readonly":""}
            onchange="setField(${i},${si},'w',this.value)">
          <input class="set-input" type="number" inputmode="numeric" placeholder="${rPH}"
            value="${set.r}" id="r-${i}-${si}" ${set.done?"readonly":""}
            onchange="setField(${i},${si},'r',this.value)">
          <button class="check-btn ${set.done?"done":""}" onclick="doneSet(${i},${si})">${set.done?"✓":"○"}</button>
        </div>`;
    });

    if (prevEx) {
      const sum = prevEx.sets.filter(s=>s.done).map(s=>`${s.w||"—"}×${s.r||"—"}`).join(", ");
      if (sum) html += `<div class="prev-note">Last: ${sum}</div>`;
    }
    html += `</div></div>`;
  });

  html += `</div>`; // ex-list

  // ── ABS ──
  if (session.abs?.length) {
    html += `
      <div class="ex-card" style="margin:0 16px 8px">
        <div class="ex-stripe" style="background:#FDBA74"></div>
        <div class="ex-header">
          <div class="ex-title">
            <div class="ex-name">Abs Finisher</div>
            <div class="ex-chips">
              <span class="chip" style="background:var(--m-abs);color:#333">Core</span>
            </div>
          </div>
        </div>`;
    session.abs.forEach((a, i) => {
      html += `
        <div class="abs-set-row">
          <div class="abs-ex-name">${a.name}</div>
          <div class="abs-ex-sets">${a.sets}</div>
          <button class="check-btn ${a.done?"done":""}" onclick="toggleAbs(${i})">${a.done?"✓":"○"}</button>
        </div>`;
    });
    html += `</div>`;
  }

  html += `<button class="done-btn" onclick="finishWorkout()">
    ${allDone ? "✓ Workout Complete!" : "Mark Workout Done"}
  </button>`;

  document.getElementById("workout-body").innerHTML = html;
}

// ─── SET ACTIONS ──────────────────────────────────────────────────────────
function setField(ei, si, field, val) {
  session.exercises[ei].sets[si][field] = val;
  saveSession();
}

function doneSet(ei, si) {
  const set = session.exercises[ei].sets[si];
  if (set.done) { set.done = false; saveSession(); renderWorkout(); return; }

  const wEl = document.getElementById(`w-${ei}-${si}`);
  const rEl = document.getElementById(`r-${ei}-${si}`);
  if (wEl) set.w = wEl.value;
  if (rEl) set.r = rEl.value;
  set.done = true;
  saveSession();

  // Determine rest duration and next label
  const ex        = session.exercises[ei];
  const nextSi    = si + 1;
  const nextEi    = ei + 1;
  let   restDur   = 60;  // default: between sets
  let   nextLabel = "";
  let   typeLabel = "Between Sets · 60s";

  const lastSetOfExercise = nextSi >= ex.sets.length;
  const lastExercise      = nextEi >= session.exercises.length;

  if (!lastSetOfExercise) {
    // More sets of same exercise
    restDur   = 60;
    typeLabel = "Between Sets · 60s";
    nextLabel = `Set ${nextSi + 1} of ${ex.name.replace(" ★","")}`;
  } else if (!lastExercise) {
    if (ex.superset) {
      // Superset transition — very short
      restDur   = 15;
      typeLabel = "Superset Transition · 15s";
      nextLabel = session.exercises[nextEi].name.replace(" ★","");
    } else {
      // Moving to next exercise
      restDur   = 90;
      typeLabel = "Between Exercises · 90s";
      nextLabel = session.exercises[nextEi].name.replace(" ★","");
    }
  }

  renderWorkout();
  startTimer(restDur, nextLabel, typeLabel);
}

function toggleWalk() {
  session.walkDone = !session.walkDone;
  saveSession();
  renderWorkout();
}

function toggleAbs(i) {
  session.abs[i].done = !session.abs[i].done;
  saveSession();
  renderWorkout();
}

function toggleSS(ei) {
  session.exercises[ei].superset = !session.exercises[ei].superset;
  activePlan.exercises[ei].superset = session.exercises[ei].superset;
  const type = SCHEDULE.find(d => d.day === activeDayKey)?.type;
  savePlan(type, activePlan);
  saveSession();
  renderWorkout();
}

function finishWorkout() {
  const type = SCHEDULE.find(d => d.day === activeDayKey)?.type;
  localStorage.setItem("sess_" + todayKey() + "_" + type + "_done", "1");
  saveSession();
  renderWorkout();
}

// ─── TIMER ────────────────────────────────────────────────────────────────
const CIRC = 452; // 2π × 72

function startTimer(seconds, nextLabel, typeLabel) {
  if (timerHandle) clearInterval(timerHandle);
  timerLeft  = seconds;
  timerTotal = seconds;

  document.getElementById("timer-type-label").textContent = typeLabel || "";
  document.getElementById("timer-count").textContent      = timerLeft;
  document.getElementById("timer-next").textContent       = nextLabel ? "Next: " + nextLabel : "";
  updateRing();
  document.getElementById("timer-overlay").classList.add("active");

  timerHandle = setInterval(() => {
    timerLeft--;
    document.getElementById("timer-count").textContent = Math.max(0, timerLeft);
    updateRing();
    if (timerLeft <= 0) skipTimer();
  }, 1000);

  if (navigator.vibrate) navigator.vibrate(80);
}

function updateRing() {
  const prog = document.getElementById("ring-prog");
  if (!prog) return;
  const frac   = Math.max(0, timerLeft / timerTotal);
  prog.style.strokeDashoffset = CIRC - frac * CIRC;
  prog.style.stroke = timerLeft <= 5 ? "#F87171" : "#E0A0B4";
}

function skipTimer() {
  if (timerHandle) { clearInterval(timerHandle); timerHandle = null; }
  document.getElementById("timer-overlay").classList.remove("active");
  if (navigator.vibrate) navigator.vibrate([60, 30, 60]);
}

function addTime(sec) { timerLeft += sec; document.getElementById("timer-count").textContent = timerLeft; }

// ─── SWAP ─────────────────────────────────────────────────────────────────
function openSwap(ei) {
  swapIdx = ei;
  const ex = session.exercises[ei];
  document.getElementById("swap-title").textContent = "Swap: " + ex.name.replace(" ★","");
  const opts    = LIBRARY[ex.muscle] || [];
  const inUse   = session.exercises.map(e => e.name);
  document.getElementById("swap-list").innerHTML =
    `<div class="swap-group">${ex.muscle}</div>` +
    opts.map(name => {
      const cur  = name === ex.name;
      const used = inUse.includes(name) && !cur;
      return `<div class="swap-row" onclick="${used||cur ? "" : `doSwap('${name.replace(/'/g,"\\'")}');`}">
        <div class="swap-row-info">
          <div class="swap-row-name">${name.replace(" ★","")}</div>
          ${name.includes("★") ? '<div class="swap-row-note">★ Unilateral</div>' : ""}
          ${used ? '<div class="swap-row-note" style="color:#C04545">Already in this workout</div>' : ""}
        </div>
        ${cur ? '<div class="swap-tick">✓</div>' : ""}
      </div>`;
    }).join("");
  document.getElementById("swap-modal").classList.add("active");
}

function doSwap(newName) {
  if (swapIdx === null) return;
  const ex = session.exercises[swapIdx];
  ex.name  = newName;
  ex.sets  = ex.sets.map(() => ({w:"", r:"", done:false}));
  activePlan.exercises[swapIdx].name = newName;
  const type = SCHEDULE.find(d => d.day === activeDayKey)?.type;
  savePlan(type, activePlan);
  saveSession();
  closeSwap();
  renderWorkout();
}

function closeSwap() {
  document.getElementById("swap-modal").classList.remove("active");
  swapIdx = null;
}

// ─── NEW WEEK ─────────────────────────────────────────────────────────────
function doNewWeek(type) {
  if (!confirm("Generate a new week? Exercises rotate within the same muscle groups.")) return;
  const plan = JSON.parse(JSON.stringify(DEFAULT_PLAN[type]));
  const used = [];
  plan.exercises = plan.exercises.map(ex => {
    const pool    = (LIBRARY[ex.muscle] || []).filter(n => n !== ex.name && !used.includes(n));
    const pick    = pool.length > 0 ? pool[Math.floor(Math.random() * pool.length)] : ex.name;
    used.push(pick);
    return { ...ex, name: pick };
  });
  savePlan(type, plan);
  activePlan = plan;
  weekNum++;
  localStorage.setItem("week_num", weekNum);
  const dKey = todayKey();
  localStorage.removeItem("sess_" + dKey + "_" + type);
  localStorage.removeItem("sess_" + dKey + "_" + type + "_done");
  openWorkout(activeDayKey, type);
}

// ─── HISTORY ──────────────────────────────────────────────────────────────
function renderHistory() {
  const keys = Object.keys(localStorage)
    .filter(k => k.startsWith("sess_") && !k.endsWith("_done"))
    .sort().reverse()
    .filter(k => k.split("_").length >= 3);

  const body = document.getElementById("history-body");
  if (!keys.length) {
    body.innerHTML = `<div class="hist-empty"><div class="hist-empty-icon">📋</div>
      <p>No workouts logged yet.<br>Complete your first session to see history.</p></div>`;
    return;
  }
  body.innerHTML = keys.map(k => {
    const d = JSON.parse(localStorage.getItem(k) || "{}");
    if (!d.dayName) return "";
    const sets = (d.exercises||[]).reduce((a,e) => a + e.sets.filter(s=>s.done).length, 0);
    const planLabel = d.type ? getPlan(d.type)?.label || "" : "";
    return `<div class="hist-card" onclick="toggleHist('${k}')">
      <div class="hist-date">${fmtDate(d.dKey)}</div>
      <div class="hist-name">${d.dayName} — ${planLabel}</div>
      <div class="hist-meta">${(d.exercises||[]).length} exercises · ${sets} sets completed</div>
      <div class="hist-detail" id="hd-${k}">
        ${(d.exercises||[]).map(ex => {
          const done = ex.sets.filter(s=>s.done);
          const sum  = done.map(s=>`${s.w||"—"}×${s.r||"—"}`).join(", ");
          return `<div class="hist-ex-row"><b>${ex.name.replace(" ★","")}</b>${sum||"no data"}</div>`;
        }).join("")}
      </div>
    </div>`;
  }).join("");
}

function toggleHist(k) {
  document.getElementById("hd-" + k)?.classList.toggle("open");
}

// ─── UTILS ────────────────────────────────────────────────────────────────
function todayKey() { return new Date().toISOString().slice(0,10); }

function dayKey(dayName) {
  const days  = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  const today = new Date();
  const diff  = days.indexOf(dayName) - today.getDay();
  const d     = new Date(today);
  d.setDate(today.getDate() + diff);
  return d.toISOString().slice(0,10);
}

function fmtDate(s) {
  if (!s) return "";
  return new Date(s + "T12:00:00").toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});
}

function saveSession() {
  const type = SCHEDULE.find(d => d.day === activeDayKey)?.type;
  if (!type) return;
  localStorage.setItem("sess_" + todayKey() + "_" + type, JSON.stringify(session));
}

function getPrevSession(type) {
  const today = "sess_" + todayKey() + "_" + type;
  const keys  = Object.keys(localStorage)
    .filter(k => k.startsWith("sess_") && k.includes("_" + type) && !k.endsWith("_done"))
    .sort().reverse();
  const prev = keys.find(k => k !== today);
  return prev ? JSON.parse(localStorage.getItem(prev)) : null;
}

// ─── INIT ─────────────────────────────────────────────────────────────────
renderSchedule();
</script>
